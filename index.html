<script>
const API = "https://pc28.help";
let lotteryData = [];
let algorithms = [];

const COMBO_LIST = ['大单', '大双', '小单', '小双'];

function getCombo(sum) {
    return (sum >= 14 ? "大" : "小") + (sum % 2 ? "单" : "双");
}

function getSpecial(balls) {
    if (!balls || balls.length < 3) return '--';
    let [a,b,c] = balls;
    if (a === b && b === c) return '豹子';
    if ((a+1 === b && b+1 === c) || (a-1 === b && b-1 === c)) return '顺子';
    if (a === b || b === c || a === c) return '对子';
    return '杂六';
}

// ===== 生成14个独立算法（10个原有 + 4个新偷的）=====
function generateAlgorithms() {
    let algos = [
        // 原有10个
        { id: 1, name: '冷热均衡', type: 'hotcold1' },
        { id: 2, name: '极速冷热', type: 'hotcold2' },
        { id: 3, name: '深度遗漏', type: 'miss1' },
        { id: 4, name: '浅层遗漏', type: 'miss2' },
        { id: 5, name: '顺势而为', type: 'trend1' },
        { id: 6, name: '逆势博弈', type: 'trend2' },
        { id: 7, name: '短周期', type: 'period1' },
        { id: 8, name: '长周期', type: 'period2' },
        { id: 9, name: '马尔可夫一阶', type: 'markov1' },
        { id: 10, name: '马尔可夫二阶', type: 'markov2' },
        // 新偷的4个
        { id: 11, name: '贝叶斯动态概率', type: 'bayes' },
        { id: 12, name: '傅里叶周期', type: 'fourier' },
        { id: 13, name: '支持向量机', type: 'svm' },
        { id: 14, name: '混沌分形', type: 'chaos' }
    ];
    
    algos.forEach(algo => {
        algo.correct = 0;
        algo.total = 0;
        algo.history = [];
        algo.winRate = 0;
        algo.winStreak = 0;
        algo.lossStreak = 0;
    });
    
    return algos;
}

// ===== 算法1：冷热均衡 =====
function predictHotCold1(data) {
    if (data.length < 20) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let stats = {大单:0,大双:0,小单:0,小双:0};
    data.slice(0, 30).forEach(d => stats[d.combo]++);
    let sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
    return {
        kill: sorted[0][0],
        protect1: sorted[1][0],
        protect2: sorted[3][0]
    };
}

// ===== 算法2：极速冷热 =====
function predictHotCold2(data) {
    if (data.length < 10) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let stats = {大单:0,大双:0,小单:0,小双:0};
    data.slice(0, 10).forEach(d => stats[d.combo]++);
    let sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
    return {
        kill: sorted[0][0],
        protect1: sorted[1][0],
        protect2: sorted[2][0]
    };
}

// ===== 算法3：深度遗漏 =====
function predictMiss1(data) {
    if (data.length < 30) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let lastIndex = {大单:999,大双:999,小单:999,小双:999};
    for (let i = 0; i < data.length; i++) {
        if (lastIndex[data[i].combo] === 999) lastIndex[data[i].combo] = i;
    }
    let sorted = Object.entries(lastIndex).sort((a, b) => b[1] - a[1]);
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 算法4：浅层遗漏 =====
function predictMiss2(data) {
    if (data.length < 10) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let lastIndex = {大单:999,大双:999,小单:999,小双:999};
    for (let i = 0; i < 10; i++) {
        if (lastIndex[data[i].combo] === 999) lastIndex[data[i].combo] = i;
    }
    let sorted = Object.entries(lastIndex).sort((a, b) => a[1] - b[1]);
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 算法5：顺势而为 =====
function predictTrend1(data) {
    if (data.length < 20) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let last = data.slice(0, 10);
    let prev = data.slice(10, 20);
    let lastC = {大单:0,大双:0,小单:0,小双:0};
    let prevC = {大单:0,大双:0,小单:0,小双:0};
    last.forEach(d => lastC[d.combo]++);
    prev.forEach(d => prevC[d.combo]++);
    
    let trend = {};
    COMBO_LIST.forEach(c => trend[c] = lastC[c] - prevC[c]);
    let sorted = Object.entries(trend).sort((a, b) => b[1] - a[1]);
    
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 算法6：逆势博弈 =====
function predictTrend2(data) {
    if (data.length < 20) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let last = data.slice(0, 10);
    let prev = data.slice(10, 20);
    let lastC = {大单:0,大双:0,小单:0,小双:0};
    let prevC = {大单:0,大双:0,小单:0,小双:0};
    last.forEach(d => lastC[d.combo]++);
    prev.forEach(d => prevC[d.combo]++);
    
    let trend = {};
    COMBO_LIST.forEach(c => trend[c] = lastC[c] - prevC[c]);
    let sorted = Object.entries(trend).sort((a, b) => b[1] - a[1]);
    
    return {
        kill: sorted[0][0],
        protect1: sorted[3][0],
        protect2: sorted[2][0]
    };
}

// ===== 算法7：短周期 =====
function predictPeriod1(data) {
    if (data.length < 8) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let periods = [3, 5, 8];
    let stats = {大单:0,大双:0,小单:0,小双:0};
    periods.forEach(p => {
        if (data.length > p) stats[data[p-1].combo] += 2;
    });
    data.slice(0, 3).forEach(d => stats[d.combo] += 1);
    let sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 算法8：长周期 =====
function predictPeriod2(data) {
    if (data.length < 13) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let periods = [13, 21, 34];
    let stats = {大单:0,大双:0,小单:0,小双:0};
    periods.forEach(p => {
        if (data.length > p) stats[data[p-1].combo] += 3;
    });
    data.slice(0, 5).forEach(d => stats[d.combo] += 1);
    let sorted = Object.entries(stats).sort((a, b) => b[1] - a[1]);
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 算法9：马尔可夫一阶 =====
function predictMarkov1(data) {
    if (data.length < 2) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let trans = {大单:{},大双:{},小单:{},小双:{}};
    COMBO_LIST.forEach(f => COMBO_LIST.forEach(t => trans[f][t] = 0));
    
    for (let i = 0; i < data.length - 1; i++) {
        trans[data[i].combo][data[i+1].combo]++;
    }
    
    let current = data[0].combo;
    let probs = trans[current];
    let sorted = Object.entries(probs).sort((a, b) => b[1] - a[1]);
    
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 算法10：马尔可夫二阶 =====
function predictMarkov2(data) {
    if (data.length < 3) return { kill: '大单', protect1: '小双', protect2: '大双' };
    let trans = {};
    
    for (let i = 0; i < data.length - 2; i++) {
        let state = data[i].combo + '→' + data[i+1].combo;
        let next = data[i+2].combo;
        if (!trans[state]) trans[state] = {大单:0,大双:0,小单:0,小双:0};
        trans[state][next]++;
    }
    
    let curState = data[0].combo + '→' + data[1].combo;
    let probs = trans[curState] || {大单:1,大双:1,小单:1,小双:1};
    let sorted = Object.entries(probs).sort((a, b) => b[1] - a[1]);
    
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 新算法11：贝叶斯动态概率 =====
function predictBayes(data) {
    if (data.length < 20) return { kill: '大单', protect1: '小双', protect2: '大双' };
    
    let prior = {大单:0.25,大双:0.25,小单:0.25,小双:0.25};
    let last20 = data.slice(0,20);
    let likelihood = {大单:1,大双:1,小单:1,小双:1};
    
    for(let i=0; i<last20.length; i++) {
        let weight = (20-i)/20;
        COMBO_LIST.forEach(c => {
            if(last20[i].combo === c) likelihood[c] *= (1 + weight);
            else likelihood[c] *= (1 - weight * 0.1);
        });
    }
    
    let posterior = {};
    COMBO_LIST.forEach(c => posterior[c] = prior[c] * likelihood[c]);
    let total = Object.values(posterior).reduce((a,b) => a+b, 0);
    COMBO_LIST.forEach(c => posterior[c] /= total);
    
    let sorted = Object.entries(posterior).sort((a,b) => b[1] - a[1]);
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 新算法12：傅里叶周期 =====
function predictFourier(data) {
    if (data.length < 30) return { kill: '大单', protect1: '小双', protect2: '大双' };
    
    let seq = data.slice(0,30).map(d => d.combo[0] === '大' ? 1 : 0);
    let periods = [];
    
    for(let lag=2; lag<=10; lag++) {
        let match = 0;
        for(let i=0; i<seq.length-lag; i++) {
            if(seq[i] === seq[i+lag]) match++;
        }
        periods.push({lag:lag, strength: match/(seq.length-lag)});
    }
    
    let strongPeriods = periods.sort((a,b) => b.strength - a.strength).slice(0,3);
    let votes = {大单:0,大双:0,小单:0,小双:0};
    
    strongPeriods.forEach(p => {
        if(data.length > p.lag) {
            let pastCombo = data[p.lag-1].combo;
            votes[pastCombo] += p.strength * 3;
        }
    });
    
    let last5 = data.slice(0,5);
    last5.forEach((d,i) => {
        votes[d.combo] += (5-i);
    });
    
    let sorted = Object.entries(votes).sort((a,b) => b[1] - a[1]);
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 新算法13：支持向量机 =====
function predictSVM(data) {
    if (data.length < 10) return { kill: '大单', protect1: '小双', protect2: '大双' };
    
    let weights = {大单:0,大双:0,小单:0,小双:0};
    
    for(let i=0; i<5; i++) {
        if(i < data.length) {
            weights[data[i].combo] += (5-i) * 2;
        }
    }
    
    let bigStreak = 0;
    for(let i=0; i<data.length; i++) {
        if(data[i].combo[0] === '大') bigStreak++;
        else break;
    }
    if(bigStreak >= 3) {
        COMBO_LIST.filter(c => c[0] === '小').forEach(c => weights[c] += bigStreak);
    }
    
    let oddStreak = 0;
    for(let i=0; i<data.length; i++) {
        if(data[i].combo[1] === '单') oddStreak++;
        else break;
    }
    if(oddStreak >= 3) {
        COMBO_LIST.filter(c => c[1] === '双').forEach(c => weights[c] += oddStreak);
    }
    
    let sorted = Object.entries(weights).sort((a,b) => b[1] - a[1]);
    return {
        kill: sorted[3][0],
        protect1: sorted[0][0],
        protect2: sorted[1][0]
    };
}

// ===== 新算法14：混沌分形 =====
function predictChaos(data) {
    if (data.length < 20) return { kill: '大单', protect1: '小双', protect2: '大双' };
    
    let seq = data.slice(0,20).map(d => d.combo[0] === '大' ? 1 : 0);
    let changes = 0;
    for(let i=1; i<seq.length; i++) {
        if(seq[i] !== seq[i-1]) changes++;
    }
    let chaosScore = changes / seq.length;
    
    if(chaosScore > 0.4) {
        // 混沌时用冷热
        let stats = {大单:0,大双:0,小单:0,小双:0};
        data.slice(0,15).forEach(d => stats[d.combo]++);
        let sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
        return {
            kill: sorted[0][0],
            protect1: sorted[3][0],
            protect2: sorted[2][0]
        };
    } else {
        // 有规律时用趋势
        let last5 = data.slice(0,5);
        let trend = {};
        COMBO_LIST.forEach(c => trend[c] = 0);
        for(let i=0; i<last5.length; i++) {
            trend[last5[i].combo] += (5-i);
        }
        let sorted = Object.entries(trend).sort((a,b) => b[1] - a[1]);
        return {
            kill: sorted[3][0],
            protect1: sorted[0][0],
            protect2: sorted[1][0]
        };
    }
}

// ===== 统一预测入口 =====
function predictForAlgo(algo, data) {
    switch(algo.type) {
        case 'hotcold1': return predictHotCold1(data);
        case 'hotcold2': return predictHotCold2(data);
        case 'miss1': return predictMiss1(data);
        case 'miss2': return predictMiss2(data);
        case 'trend1': return predictTrend1(data);
        case 'trend2': return predictTrend2(data);
        case 'period1': return predictPeriod1(data);
        case 'period2': return predictPeriod2(data);
        case 'markov1': return predictMarkov1(data);
        case 'markov2': return predictMarkov2(data);
        case 'bayes': return predictBayes(data);
        case 'fourier': return predictFourier(data);
        case 'svm': return predictSVM(data);
        case 'chaos': return predictChaos(data);
        default: return { kill: '大单', protect1: '小双', protect2: '大双' };
    }
}

// ===== API获取数据 =====
async function fetchData() {
    try {
        $('#apiStatus').text('🟡 加载中...');
        let res = await fetch(API + "/kj.json?limit=100");
        let d = await res.json();
        
        if (d && d.data) {
            lotteryData = d.data.map(item => ({
                qihao: item.qihao,
                balls: item.opennum ? item.opennum.split('+').map(Number) : [0, 0, 0],
                sum: Number(item.sum),
                combo: getCombo(Number(item.sum))
            }));
            $('#apiStatus').text('🟢 数据在线');
        }
    } catch (e) {
        $('#apiStatus').text('🔴 离线模式');
        lotteryData = [];
        for (let i = 0; i < 100; i++) {
            let s = Math.floor(Math.random() * 28);
            lotteryData.push({
                qihao: 3398700 + i,
                balls: [Math.floor(Math.random() * 10), Math.floor(Math.random() * 10), Math.floor(Math.random() * 10)],
                sum: s,
                combo: getCombo(s)
            });
        }
    }
    updateLive();
    verifyAllAlgorithms();
    renderAlgos();
    renderHistory();
}

function updateLive() {
    if (!lotteryData.length) return;
    let l = lotteryData[0];
    $('#period').text(l.qihao + '期');
    $('#ball1').text(l.balls[0]);
    $('#ball2').text(l.balls[1]);
    $('#ball3').text(l.balls[2]);
    $('#sum').text(l.sum);
    $('#fullNumber').html(`<span>${l.balls.join('+')}=${l.sum}</span> ${l.combo}`);
    
    let sz = l.combo[0];
    let pr = l.combo[1];
    let sp = getSpecial(l.balls);
    
    $('#sizeTag').text(sz).removeClass().addClass(`tag ${sz == '大' ? 'big' : 'small'}`);
    $('#parityTag').text(pr).removeClass().addClass(`tag ${pr == '单' ? 'odd' : 'even'}`);
    $('#specialTag').text(sp);
}

// ===== 验证所有算法 =====
function verifyAllAlgorithms() {
    if (lotteryData.length < 30) return;
    
    algorithms.forEach(algo => {
        algo.correct = 0;
        algo.total = 0;
        algo.history = [];
        
        for (let i = 1; i <= 30; i++) {
            if (i >= lotteryData.length) break;
            let testData = lotteryData.slice(i).map(d => ({ combo: d.combo }));
            let pred = predictForAlgo(algo, testData);
            let actual = lotteryData[i - 1].combo;
            let ok = pred.kill !== actual;
            
            algo.history.push({
                period: lotteryData[i - 1].qihao,
                kill: pred.kill,
                protect1: pred.protect1,
                protect2: pred.protect2,
                actual: actual,
                ok: ok
            });
            if (ok) algo.correct++;
            algo.total++;
        }
        algo.winRate = (algo.correct / algo.total * 100).toFixed(1);
        
        let w = 0, l = 0, mw = 0, ml = 0;
        algo.history.forEach(h => {
            if (h.ok) { w++; l = 0; if (w > mw) mw = w; }
            else { l++; w = 0; if (l > ml) ml = l; }
        });
        algo.winStreak = mw;
        algo.lossStreak = ml;
    });
    
    // 按胜率排序，高的排第一
    algorithms.sort((a, b) => b.winRate - a.winRate);
}

// ===== 渲染算法卡片 =====
function renderAlgos() {
    if (!lotteryData.length) return;
    
    let html = '';
    
    algorithms.forEach(algo => {
        let nextPred = predictForAlgo(algo, lotteryData.map(d => ({ combo: d.combo })));
        let lastActual = lotteryData[0]?.combo || '--';
        let lastPred = algo.history[0] || { kill: '--', protect1: '--', protect2: '--', ok: false };
        let lastKillOK = lastPred.kill !== lastActual && lastPred.kill !== '--';
        let lastProtectOK = (lastPred.protect1 === lastActual || lastPred.protect2 === lastActual);
        
        html += `
        <div class="algo-card">
            <div class="algo-header">
                <span class="algo-name">${algo.name}</span>
                <span class="algo-id">#${algo.id}</span>
            </div>
            
            <div class="rate-box">
                <div class="rate-left">
                    <span class="rate-number">${algo.winRate}</span>
                    <span class="rate-label">%</span>
                </div>
                <div class="rate-stats">
                    <div class="stat-item">
                        <div class="stat-number">${algo.winStreak}</div>
                        <div class="stat-label">最大连中</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">${algo.lossStreak}</div>
                        <div class="stat-label">最大连挂</div>
                    </div>
                </div>
            </div>
            
            <div class="prediction-box">
                <div class="prediction-title">🔮 下一期预测</div>
                <div class="prediction-row">
                    <div class="kill-box">
                        <div class="small">杀</div>
                        <div class="big">${nextPred.kill}</div>
                    </div>
                    <div class="protect-box">
                        <div class="protect-item">
                            <div class="small">防1</div>
                            <div class="big">${nextPred.protect1}</div>
                        </div>
                        <div class="protect-item">
                            <div class="small">防2</div>
                            <div class="big">${nextPred.protect2}</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="review-box">
                <span class="review-label">✨ 上期</span>
                <span class="review-kill">杀 ${lastPred.kill}</span>
                <span class="review-protect">防 ${lastPred.protect1}/${lastPred.protect2}</span>
                <span class="review-icon ${lastKillOK ? 'hit' : 'miss'}">${lastKillOK ? '✅' : '❌'}</span>
                <span class="review-icon ${lastProtectOK ? 'hit' : 'miss'}">${lastProtectOK ? '✅' : '❌'}</span>
            </div>
            
            <div class="card-footer">
                <span class="verify-info">已验证 ${algo.total}期 · 中${algo.correct}期</span>
                <button class="history-btn" onclick="showHistory(${algo.id})">📋 独立历史</button>
            </div>
        </div>
        `;
    });
    
    $('#algoGrid').html(html);
}

function renderHistory() {
    let html = '';
    lotteryData.slice(0, 30).forEach(d => {
        html += `<tr>
            <td>${d.qihao}</td>
            <td>${d.balls.join('+')}</td>
            <td>${d.sum}</td>
            <td style="color:#1b4b5c; font-weight:600;">${d.combo}</td>
        </tr>`;
    });
    $('#historyBody').html(html);
}

window.showHistory = function(id) {
    let algo = algorithms.find(a => a.id === id);
    if (!algo) return;
    
    let html = '<table class="history-table"><tr><th>期号</th><th>杀</th><th>防</th><th>实际</th><th>结果</th></tr>';
    algo.history.slice(0, 20).forEach(item => {
        html += `<tr>
            <td>${item.period}</td>
            <td><span style="color:#e46f6f; font-weight:700;">${item.kill}</span></td>
            <td><span style="color:#5f9ea0;">${item.protect1}/${item.protect2}</span></td>
            <td>${item.actual}</td>
            <td class="${item.ok ? 'hit-text' : 'miss-text'}">${item.ok ? '✅' : '❌'}</td>
        </tr>`;
    });
    html += `<tr><td colspan="5" style="text-align:center; padding:15px; background:#f2f9fc;">
        总胜率 ${algo.winRate}% (${algo.correct}/${algo.total})
    </td></tr>`;
    
    $('#modalTitle').text(algo.name + ' · 历史验证');
    $('#modalContent').html(html);
    $('#historyModal').addClass('active');
    $('#modalOverlay').addClass('active');
};

window.closeModal = function() {
    $('#historyModal').removeClass('active');
    $('#modalOverlay').removeClass('active');
};

$('.tab').click(function() {
    $('.tab').removeClass('active');
    $(this).addClass('active');
    $('.page').removeClass('active');
    $('#page-' + $(this).data('page')).addClass('active');
});

$('#refreshBtn').click(fetchData);

$(document).on('click', function(e) {
    if ($(e.target).closest('#historyModal').length === 0 && 
        !$(e.target).hasClass('history-btn') && 
        $('#historyModal').hasClass('active')) {
        closeModal();
    }
});

algorithms = generateAlgorithms();
fetchData();

let sec = 149;
setInterval(() => {
    sec--;
    if (sec < 0) sec = 210;
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    $('#countdown').text(m + '分' + (s < 10 ? '0' : '') + s + '秒');
}, 1000);
</script>
